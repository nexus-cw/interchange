name = "interchange"
main = "src/worker.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]
# account_id = "REPLACE_WITH_CLOUDFLARE_ACCOUNT_ID"  # set via CLOUDFLARE_ACCOUNT_ID env

# D1 on the free tier — proof-of-concept storage for the Mailbox + pair
# registry. Upgrade path is to swap this for a per-pair Durable Object on
# Workers Paid; the Mailbox API surface (append / list-since / ack) is the
# same either way, so routes.ts and the wire protocol don't change.
[[d1_databases]]
binding = "DB"
database_name = "interchange"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
